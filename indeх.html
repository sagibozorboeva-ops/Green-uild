<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Calculator | Sustainable Civil Engineering</title>
    <style>
        :root {
            --bg-main: #12181f;
            --bg-card: #1c2431;
            --primary: #00e676;
            --primary-hover: #00b252;
            --text-main: #ffffff;
            --text-muted: #b0bec5;
            --border: #2c3749;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        header p {
            color: var(--text-muted);
            font-style: italic;
            font-size: 1.1rem;
        }
        /* Вкладки (Tabs Navigation) */
        .tabs {
            display: flex;
            justify-content: center;
            border-bottom: 2px solid var(--border);
            margin-bottom: 30px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 15px 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn:hover {
            color: var(--primary);
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
            margin-bottom: -2px;
        }
        .tab-content {
            display: none;
            background-color: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .tab-content.active {
            display: block;
        }
        /* Сетка для калькулятора */
        .calc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .calc-grid { grid-template-columns: 1fr; }
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }
        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-main);
            border: 2px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 16px;
            box-sizing: border-box;
        }
        select:focus, input:focus {
            border-color: var(--primary);
            outline: none;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-top: 15px;
            background: var(--bg-main);
            padding: 12px;
            border-radius: 6px;
            border: 1px dashed var(--border);
        }
        .checkbox-group input {
            margin-right: 12px;
            transform: scale(1.3);
            cursor: pointer;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--bg-main);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
        }
        button.calc-trigger {
            width: 100%;
            background-color: var(--primary);
            color: #000;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button.calc-trigger:hover {
            background-color: var(--primary-hover);
        }
        /* Панель результатов */
        .results-panel {
            background-color: var(--bg-main);
            border-left: 5px solid var(--primary);
            padding: 20px;
            border-radius: 4px;
            display: none;
        }
        .results-panel h3 {
            color: var(--primary);
            margin-top: 0;
        }
        .res-line {
            margin: 12px 0;
            font-size: 1rem;
            border-bottom: 1px dashed #2c3749;
            padding-bottom: 8px;
        }
        .res-line span {
            font-weight: bold;
            color: var(--primary);
        }
        .eq-box {
            background: rgba(0, 230, 118, 0.1);
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            border: 1px solid rgba(0, 230, 118, 0.3);
        }
        /* Карточки для контекста и отзывов */
        .fact-card {
            background: var(--bg-main);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .fact-card h3 {
            color: var(--primary);
            margin-top: 0;
        }
        .professor-block {
            display: flex;
            gap: 20px;
            background: var(--bg-main);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            align-items: center;
            margin-bottom: 30px;
        }
        .prof-avatar {
            width: 80px;
            height: 80px;
            background: #2c3749;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 2px solid var(--primary);
        }
        .review-quote {
            font-style: italic;
            background: #12181f;
            padding: 15px;
            border-left: 4px solid #b0bec5;
            margin-top: 10px;
            border-radius: 4px;
        }
        .submit-feedback-btn {
            display: inline-block;
            background: none;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 20px;
        }
        .submit-feedback-btn:hover {
            background: var(--primary);
            color: #000;
        }
        ul.source-list li {
            margin-bottom: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏗️ Sustainable Civil Engineering Eco-Calculator</h1>
        <p>An Advanced Analytical Tool Modeling Embodied Carbon, Cost lifespans, and Policy Carbon Taxation</p>
    </header>

    <!-- Вкладки управления -->
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('calc')">📊 Core Calculator</button>
        <button class="tab-btn" onclick="openTab('context')">🌎 Environmental Context</button>
        <button class="tab-btn" onclick="openTab('advisory')">🧪 Scientific Advisory & Feedback</button>
        <button class="tab-btn" onclick="openTab('sources')">📚 Methodology & Sources</button>
    </div>

    <!-- ВКЛАДКА 1: КАЛЬКУЛЯТОР -->
    <div id="calc" class="tab-content active">
        <div class="calc-grid">
            <!-- Левая колонка: Вводы данных -->
            <div>
                <div class="form-group">
                    <label for="element">Structural Element & Strength Requirement:</label>
                    <select id="element" onchange="adjustMaterialBaseline()">
                        <option value="foundation">Foundation (Standard Load: 3000-4000 psi)</option>
                        <option value="columns">High-Load Columns & Beams (Requires High-Strength)</option>
                        <option value="pavement">Infrastructure Pavement / Sidewalks (Recycled Mix Fit)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="material">Material Composition Type:</label>
                    <select id="material">
                        <option value="standard">Standard Concrete (Baseline: C30/37 or 4000 psi, 100% Portland Cement)</option>
                        <option value="low_carbon">Low-Carbon Concrete (40% Fly Ash / Slag replacement)</option>
                        <option value="recycled">Recycled Aggregate Concrete</option>
                        <option value="hsc">High-Strength Concrete (HSC)</option>
                        <option value="uhpc">Ultra-High Performance Concrete (UHPC)</option>
                        <option value="steel">Structural Steel (Per Metric Ton)</option>
                    </select>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="rebar">
                        <label for="rebar" style="margin: 0; cursor: pointer;">Include Internal Steel Reinforcement (Rebar) <br><small style="color: var(--primary);">Adds structural steel carbon matrix (~85kg/m³)</small></label>
                    </div>
                </div>

                <div class="form-group">
                    <label id="quantity-label" for="quantity">Volume Required (Cubic Meters - m³):</label>
